{% set name = "pycurl-requests" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 3191fe9cd6d6915682f0026b4df75f5df3d218b1de77d6acdb447035ae9defa4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pycurl
    - chardet

test:
  imports:
    - pycurl_requests
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dcoles/pycurl-requests
  summary: A Requests-compatible interface for pycURL
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - davner
